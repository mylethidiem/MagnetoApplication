# Block 1 — Redirect HTTP to HTTPS
server {
    listen 80;
    server_name test.dyna.com;
    return 301 https://$host$request_uri;
}

# Block 2 — Handle HTTPS and forward to Varnish
server {
    listen 443 ssl;
    server_name test.dyna.com;

    # SSL certificate files (we'll generate these in next step)
    ssl_certificate     /etc/nginx/ssl/test.dyna.com.crt;
    ssl_certificate_key /etc/nginx/ssl/test.dyna.com.key;

    # Forward all traffic to Varnish
    location / {
        proxy_pass http://varnish-service:6081;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # phpMyAdmin location
    location /pma/ {
        proxy_pass http://phpmyadmin-service:80/;
        proxy_set_header Host $host;
    }
}
